<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מפת הצעות - YM Investment</title>
<style>
  html, body { height: 100%; margin: 0; font-family: Arial, Helvetica, sans-serif; }
  #app { display: flex; height: 100%; flex-direction: column; }
  #header {
    background: #1a3c34; color: white; padding: 10px 16px;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px;
  }
  #header h1 { font-size: 18px; margin: 0; }
  #controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; font-size: 14px; }
  #controls label { display: flex; align-items: center; gap: 4px; cursor: pointer; }
  #status { font-size: 13px; opacity: 0.85; }
  #map { flex: 1; width: 100%; }
  .legend-dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-inline-end: 4px; vertical-align: middle; }
  .info-box { font-family: Arial, sans-serif; direction: rtl; min-width: 240px; max-width: 320px; max-height: 320px; overflow-y: auto; }
  .info-box .addr { font-weight: bold; font-size: 14px; margin-bottom: 6px; }
  .info-box .offer-card { border-top: 1px solid #ddd; padding: 6px 0; }
  .info-box .offer-card:first-of-type { border-top: none; }
  .info-box .row { font-size: 13px; margin: 2px 0; }
  .info-box a { color: #1a73e8; }

  #gate {
    position: fixed; inset: 0; background: #1a3c34; color: white;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
    text-align: center; padding: 20px; z-index: 1000;
  }
  #gate h2 { margin: 0; font-size: 22px; }
  #gate p { margin: 0; opacity: 0.85; font-size: 14px; max-width: 320px; }
  #signInBtn {
    background: white; color: #1a3c34; border: none; padding: 10px 20px;
    border-radius: 6px; font-size: 15px; cursor: pointer; font-weight: bold;
  }
  #denied { color: #ffb4a9; font-size: 14px; display: none; }
  #userBadge { font-size: 13px; opacity: 0.9; }
  #signOutBtn {
    background: transparent; color: white; border: 1px solid rgba(255,255,255,0.4);
    padding: 4px 10px; border-radius: 4px; font-size: 12px; cursor: pointer;
  }
  #hidden-app { display: none; height: 100%; }
  #searchBox {
    display: flex; align-items: center; gap: 4px;
  }
  #searchInput {
    padding: 5px 8px; border-radius: 4px; border: none; font-size: 13px; width: 200px;
  }
  #searchBtn {
    background: #2d5a4f; color: white; border: 1px solid rgba(255,255,255,0.4);
    padding: 5px 10px; border-radius: 4px; font-size: 13px; cursor: pointer;
  }
  #searchStatus { font-size: 12px; color: #ffb4a9; }
</style>
</head>
<body>

<div id="gate">
  <h2>מפת הצעות - YM Investment</h2>
  <p>גישה לצוות בלבד. יש להתחבר עם חשבון Google מורשה כדי לצפות במפה.</p>
  <button id="signInBtn">התחבר עם Google</button>
  <p id="denied">החשבון שהתחברת איתו לא מורשה לצפות במפה הזו. פנה למנהל המערכת אם אתה חושב שזו טעות.</p>
</div>

<div id="hidden-app">
  <div id="app">
    <div id="header">
      <h1>מפת הצעות - YM Investment</h1>
      <div id="controls">
        <div id="searchBox">
          <input type="text" id="searchInput" placeholder="חפש כתובת...">
          <button id="searchBtn">חפש</button>
        </div>
        <label><input type="checkbox" id="filterAcquisition" checked><span class="legend-dot" style="background:#1a73e8"></span>Acquisition</label>
        <label><input type="checkbox" id="filterDispo" checked><span class="legend-dot" style="background:#ea4335"></span>Dispo</label>
        <label><input type="checkbox" id="filterOther" checked><span class="legend-dot" style="background:#9334e6"></span>אחר (Renegotiation וכו')</label>
        <span id="status">טוען נתונים...</span>
        <span id="searchStatus"></span>
        <span id="userBadge"></span>
        <button id="signOutBtn">התנתק</button>
      </div>
    </div>
    <div id="map"></div>
  </div>
</div>

<script>
  var SHEET_ID = '1_x9a6aaQFxCamkaM4EObeqXWGWd_hmAahIWVLo2nZGs';
  var OAUTH_CLIENT_ID = '1087744472950-95mbif2raq761kpacib6unfqsondc843.apps.googleusercontent.com';
  var MAPS_API_KEY = 'AIzaSyAkKhfX5iHJJW7FHMYJ1OmQczmZ6ed5fSc';
  var RANGE = 'A2:K10000';
  var SCOPE = 'https://www.googleapis.com/auth/spreadsheets.readonly https://www.googleapis.com/auth/userinfo.email';

  var map, geocoder, tokenClient, accessToken;
  var allMarkers = [];
  var offersData = [];
  var mapsScriptLoaded = false;
  var markersByAddress = {};

  function loadMapsScript() {
    if (mapsScriptLoaded) { return; }
    mapsScriptLoaded = true;
    var s = document.createElement('script');
    s.src = 'https://maps.googleapis.com/maps/api/js?key=' + MAPS_API_KEY + '&loading=async&callback=initMap';
    s.async = true;
    document.head.appendChild(s);
  }

  window.onload = function() {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: OAUTH_CLIENT_ID,
      scope: SCOPE,
      callback: handleTokenResponse
    });
    document.getElementById('signInBtn').addEventListener('click', function() {
      document.getElementById('denied').style.display = 'none';
      tokenClient.requestAccessToken();
    });
    document.getElementById('signOutBtn').addEventListener('click', function() {
      if (accessToken) {
        google.accounts.oauth2.revoke(accessToken, function() {});
      }
      accessToken = null;
      document.getElementById('hidden-app').style.display = 'none';
      document.getElementById('gate').style.display = 'flex';
    });
  };

  function handleTokenResponse(resp) {
    if (resp.error) {
      showDenied();
      return;
    }
    accessToken = resp.access_token;
    verifyAndLoad();
  }

  function verifyAndLoad() {
    var url = 'https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID + '/values/' + encodeURIComponent(RANGE);
    fetch(url, { headers: { 'Authorization': 'Bearer ' + accessToken } })
      .then(function(res) {
        if (!res.ok) { throw new Error('denied'); }
        return res.json();
      })
      .then(function(data) {
        document.getElementById('gate').style.display = 'none';
        document.getElementById('hidden-app').style.display = 'block';
        fetchUserEmail();
        processSheetData(data);
        loadMapsScript();
      })
      .catch(function() {
        showDenied();
      });
  }

  function fetchUserEmail() {
    fetch('https://www.googleapis.com/oauth2/v3/userinfo', { headers: { 'Authorization': 'Bearer ' + accessToken } })
      .then(function(res) { return res.json(); })
      .then(function(info) {
        document.getElementById('userBadge').textContent = info.email || '';
      })
      .catch(function() {});
  }

  function showDenied() {
    document.getElementById('denied').style.display = 'block';
  }

  function processSheetData(data) {
    var rows = data.values || [];
    offersData = rows.map(function(r) {
      return {
        address: r[0] || '',
        offerAmount: r[1] || '',
        type: r[2] || '',
        cashBuyer: r[3] || '',
        status: r[4] || '',
        offerMadeBy: r[5] || '',
        date: r[6] || '',
        leadStatus: r[7] || '',
        podioItemLink: r[8] || '',
        lat: r[9] ? parseFloat(r[9]) : null,
        lng: r[10] ? parseFloat(r[10]) : null
      };
    }).filter(function(o) { return o.address; });

    document.getElementById('status').textContent = 'טוען ' + offersData.length + ' הצעות...';
    if (map) { groupAndPlaceMarkers(); }
  }

  function typeColor(type) {
    if (type === 'Acquisition') return '#1a73e8';
    if (type === 'Dispo') return '#ea4335';
    return '#9334e6';
  }

  function groupColor(types) {
    if (types.indexOf('Dispo') !== -1) return '#ea4335';
    var hasOther = types.some(function(t) { return t !== 'Acquisition' && t !== 'Dispo'; });
    if (hasOther) return '#9334e6';
    return '#1a73e8';
  }

  function initMap() {
    map = new google.maps.Map(document.getElementById('map'), {
      center: { lat: 38.63, lng: -90.24 },
      zoom: 10
    });
    geocoder = new google.maps.Geocoder();

    document.getElementById('filterAcquisition').addEventListener('change', applyFilters);
    document.getElementById('filterDispo').addEventListener('change', applyFilters);
    document.getElementById('filterOther').addEventListener('change', applyFilters);

    document.getElementById('searchBtn').addEventListener('click', searchAddress);
    document.getElementById('searchInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { searchAddress(); }
    });

    if (offersData.length > 0) { groupAndPlaceMarkers(); }
  }

  var searchMarker = null;
  function findKnownMarker(query) {
    var norm = query.trim().toLowerCase();
    if (markersByAddress[norm]) { return markersByAddress[norm]; }
    var found = null;
    Object.keys(markersByAddress).forEach(function(key) {
      if (!found && (key.indexOf(norm) !== -1 || norm.indexOf(key) !== -1)) {
        found = markersByAddress[key];
      }
    });
    return found;
  }

  function searchAddress() {
    var query = document.getElementById('searchInput').value.trim();
    var statusEl = document.getElementById('searchStatus');
    statusEl.textContent = '';
    if (!query) { return; }

    var knownMarker = findKnownMarker(query);
    if (knownMarker) {
      map.panTo(knownMarker.getPosition());
      map.setZoom(17);
      google.maps.event.trigger(knownMarker, 'click');
      statusEl.textContent = '';
      return;
    }

    statusEl.textContent = 'מחפש...';
    geocoder.geocode({ address: query }, function(results, status) {
      if (status === 'OK' && results[0]) {
        var loc = results[0].geometry.location;
        map.panTo(loc);
        map.setZoom(16);
        if (searchMarker) { searchMarker.setMap(null); }
        searchMarker = new google.maps.Marker({
          position: loc,
          map: map,
          icon: {
            path: google.maps.SymbolPath.CIRCLE,
            fillColor: '#ffd700',
            fillOpacity: 1,
            strokeColor: '#000000',
            strokeWeight: 2,
            scale: 9
          },
          zIndex: 999
        });
        statusEl.textContent = 'לא נמצא נכס תואם בנתונים - זו הכתובת הכללית בלבד';
      } else {
        statusEl.textContent = 'הכתובת לא נמצאה';
      }
    });
  }

  function groupAndPlaceMarkers() {
    var groups = {};
    var order = [];
    offersData.forEach(function(offer) {
      var key = offer.address.trim().toLowerCase();
      if (!groups[key]) {
        groups[key] = { address: offer.address, offers: [], lat: offer.lat, lng: offer.lng };
        order.push(key);
      }
      groups[key].offers.push(offer);
      if (!groups[key].lat && offer.lat) { groups[key].lat = offer.lat; groups[key].lng = offer.lng; }
    });

    var pending = 0;
    var placed = 0;
    var total = order.length;

    order.forEach(function(key) {
      var group = groups[key];
      if (group.lat && group.lng) {
        createGroupMarker(group);
        placed++;
        updateStatus(placed, pending, total);
      } else {
        pending++;
        geocoder.geocode({ address: group.address }, function(results, status) {
          pending--;
          if (status === 'OK' && results[0]) {
            var loc = results[0].geometry.location;
            group.lat = loc.lat();
            group.lng = loc.lng();
            createGroupMarker(group);
            placed++;
          }
          updateStatus(placed, pending, total);
        });
      }
    });
    updateStatus(placed, pending, total);
  }

  function updateStatus(placed, pending, total) {
    document.getElementById('status').textContent =
      placed + ' נכסים על המפה (' + offersData.length + ' הצעות)' + (pending > 0 ? ' — מגאוקד עוד ' + pending : '');
  }

  function createGroupMarker(group) {
    var types = group.offers.map(function(o) { return o.type; });
    var color = groupColor(types);
    var count = group.offers.length;

    var marker = new google.maps.Marker({
      position: { lat: group.lat, lng: group.lng },
      map: map,
      title: group.address + (count > 1 ? ' (' + count + ' הצעות)' : ''),
      icon: {
        path: google.maps.SymbolPath.CIRCLE,
        fillColor: color,
        fillOpacity: 0.9,
        strokeColor: '#ffffff',
        strokeWeight: 1,
        scale: count > 1 ? 11 : 8
      },
      label: count > 1 ? { text: String(count), color: '#ffffff', fontSize: '11px', fontWeight: 'bold' } : null
    });
    marker.offerTypes = types;

    var content = '<div class="info-box">' +
      '<div class="addr">' + escapeHtml(group.address) + (count > 1 ? ' — ' + count + ' הצעות' : '') + '</div>' +
      group.offers.map(function(offer) {
        return '<div class="offer-card">' +
          '<div class="row"><b>סכום:</b> $' + escapeHtml(offer.offerAmount) + '</div>' +
          '<div class="row"><b>Type:</b> ' + escapeHtml(offer.type) + '</div>' +
          (offer.cashBuyer ? '<div class="row"><b>Cash Buyer:</b> ' + escapeHtml(offer.cashBuyer) + '</div>' : '') +
          '<div class="row"><b>Status:</b> ' + escapeHtml(offer.status) + '</div>' +
          '<div class="row"><b>הוגש ע"י:</b> ' + escapeHtml(offer.offerMadeBy) + '</div>' +
          '<div class="row"><b>תאריך:</b> ' + escapeHtml(offer.date) + '</div>' +
          (offer.podioItemLink ? '<div class="row"><a href="' + offer.podioItemLink + '" target="_blank">פתח בפודיו ↗</a></div>' : '') +
          '</div>';
      }).join('') +
      '<div class="row" style="margin-top:6px;"><b>סטטוס נכס:</b> ' + escapeHtml(group.offers[0].leadStatus) + '</div>' +
      '</div>';

    var infoWindow = new google.maps.InfoWindow({ content: content });
    marker.addListener('click', function() {
      infoWindow.open(map, marker);
    });
    marker.infoWindow = infoWindow;

    allMarkers.push(marker);
    markersByAddress[group.address.trim().toLowerCase()] = marker;
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function applyFilters() {
    var showAcq = document.getElementById('filterAcquisition').checked;
    var showDispo = document.getElementById('filterDispo').checked;
    var showOther = document.getElementById('filterOther').checked;

    allMarkers.forEach(function(marker) {
      var types = marker.offerTypes;
      var visible = types.some(function(t) {
        if (t === 'Acquisition') return showAcq;
        if (t === 'Dispo') return showDispo;
        return showOther;
      });
      marker.setVisible(visible);
    });
  }
</script>
<script src="https://accounts.google.com/gsi/client"></script>
</body>
</html>
